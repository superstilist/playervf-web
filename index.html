<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/playervf-web/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PlayerVF - Music Player">
  <title>PlayerVF</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; }
    .loading {
      display: flex; justify-content: center; align-items: center;
      width: 100vw; height: 100vh; font-family: system-ui, sans-serif;
      color: #666; font-size: 14px;
    }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid #222;
      border-top-color: #888; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="preload" href="main.dart.js" as="script">
  <script src="id3_extractor.js" defer></script>
  <script>
    // Load jsmediatags asynchronously so it doesn't block Flutter
    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    loadScript('https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js')
      .catch(function() { console.warn('jsmediatags CDN unavailable – cover extraction disabled'); });
  </script>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Loading PlayerVF...</span>
  </div>
  <script>
    // Register service worker for offline caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('flutter_service_worker.js?v=2694965653') /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */.catch(function() {});
    }
  </script>
  <script defer src="main.dart.js"></script>
  <script>
    // Hide loading spinner once Flutter engine is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  </script>
</body>
</html>
